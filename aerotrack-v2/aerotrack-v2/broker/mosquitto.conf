# ─── AeroTrack BR — Mosquitto MQTT Broker Config ───────────────────────────

# Listener MQTT padrão (aviões e servidor de aplicação)
listener 1883
protocol mqtt

# Listener WebSocket (browser pode conectar diretamente se necessário)
listener 9001
protocol websockets

# Sem autenticação (desenvolvimento) — em produção: password_file
allow_anonymous true

# Persistência: retained messages sobrevivem ao restart do broker
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Qualidade de serviço máxima permitida
# QoS 0 para telemetria (fire-and-forget)
# QoS 1 para eventos de ciclo de vida
max_qos 1

# Tamanho máximo de mensagem (bytes) — telemetria JSON é pequena
max_packet_size 65536

# Fila de mensagens por cliente (evita sobrecarga em flash crowds)
max_inflight_messages 100
max_queued_messages 1000
